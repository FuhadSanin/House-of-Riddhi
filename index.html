    <script>
      (function () {
        try {
          var key = "house-of-riddhi-theme";
          var stored = localStorage.getItem(key) || "light";
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
